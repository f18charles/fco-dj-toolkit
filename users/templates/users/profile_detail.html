{% extends "base.html" %}

{% block content %}
  <h1>{{ profile_user.full_name }}</h1>
  <p>Username: {{ profile_user.username }}</p>
  <p>Email: {{ profile_user.email }}</p>
  {% if profile_user.avatar %}
    <img src="{{ profile_user.avatar.url }}" alt="{{ profile_user.username }} avatar">
  {% endif %}
  <p><a href="{% url 'users:profile-edit' %}">Edit profile</a></p>
{% endblock %}
